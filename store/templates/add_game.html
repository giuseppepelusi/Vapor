{% extends 'base.html' %}
{% block title %}Add New Game{% endblock %}
{% block content %}
    <section>
        <h1>Publish New Game</h1>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div>
                <label for="title">Game Title *</label>
                <input type="text"
                       id="title"
                       name="title"
                       required
                       autofocus
                       placeholder="Enter game title">
            </div>
            <div>
                <label for="description">Description *</label>
                <textarea id="description"
                          name="description"
                          required
                          rows="6"
                          placeholder="Describe your game..."></textarea>
            </div>
            <div>
                <label for="price">Price *</label>
                <input type="number"
                       id="price"
                       name="price"
                       required
                       step="0.01"
                       min="0"
                       max="9999.99"
                       placeholder="0.00">
            </div>
            <div>
                <label for="requirements">System Requirements *</label>
                <textarea id="requirements"
                          name="requirements"
                          required
                          rows="4"
                          placeholder="e.g., OS: Windows 10, CPU: Intel i5, RAM: 8GB"></textarea>
            </div>
            <div>
                <label for="cover_image">Cover Image</label>
                <input type="file" id="cover_image" name="cover_image" accept="image/*">
            </div>
            <div class="genres-container">
                <span class="genres-title">Genres *</span>
                <div class="genres-grid">
                    {% for genre in genres %}
                        <label class="genre-item">
                            <input type="checkbox" name="genres" value="{{ genre.id }}">
                            <span>{{ genre.name }}</span>
                        </label>
                    {% endfor %}
                </div>
            </div>
            <div class="form-actions">
                <button type="submit">Publish Game</button>
                <a href="{% url 'dashboard' %}" role="button">Cancel</a>
            </div>
        </form>
    </section>
{% endblock %}
